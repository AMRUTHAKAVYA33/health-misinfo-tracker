services:
  - type: web
    name: health-misinfo-tracker
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: health-misinfo-tracker-db
          property: connectionString

databases:
  - name: health-misinfo-tracker-db
    plan: free
    databaseName: health_misinfo_tracker
    user: health_misinfo_tracker
